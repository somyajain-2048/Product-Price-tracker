<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 340px;
      background: #f8fafc;
      color: #0f172a;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 15px; height: 15px; color: white; }
    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: white;
      letter-spacing: -0.2px;
    }
    .header-text p {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
      margin-top: 1px;
    }

    /* ── Body ── */
    .body { padding: 16px; }

    /* Auth warning */
    .auth-warning {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 14px;
      display: none;
    }
    .auth-warning-title {
      font-size: 13px;
      font-weight: 600;
      color: #991b1b;
      margin-bottom: 4px;
    }
    .auth-warning-body {
      font-size: 12px;
      color: #b91c1c;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .btn-login {
      display: block;
      width: 100%;
      text-align: center;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.88; }

    /* App content */
    #app-content { display: none; }

    /* URL card */
    .url-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .url-label {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .url-text {
      font-size: 11.5px;
      color: #475569;
      word-break: break-all;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    /* Track button */
    .btn-track {
      width: 100%;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }
    .btn-track:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-track:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success state */
    #success-state { display: none; }

    .success-card {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      margin-bottom: 12px;
    }
    .success-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
    }
    .success-icon svg { width: 18px; height: 18px; color: white; }
    .success-title {
      font-size: 13.5px;
      font-weight: 600;
      color: #15803d;
      margin-bottom: 3px;
    }
    .success-sub {
      font-size: 11.5px;
      color: #4ade80;
      color: #16a34a;
    }

    .btn-dashboard {
      width: 100%;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
      transition: opacity 0.15s;
    }
    .btn-dashboard:hover { opacity: 0.9; }
    .btn-dashboard svg { width: 14px; height: 14px; }

    .btn-track-another {
      width: 100%;
      margin-top: 8px;
      background: transparent;
      color: #6366f1;
      border: 1px solid #c7d2fe;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-track-another:hover { background: #eef2ff; }

    /* Error */
    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
      color: #dc2626;
      margin-top: 10px;
      display: none;
      line-height: 1.4;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: center;
    }
    .footer a {
      font-size: 10.5px;
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer a:hover { color: #6366f1; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
      </svg>
    </div>
    <div class="header-text">
      <h1>PriceTrack</h1>
      <p>Track prices, save money</p>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Auth warning -->
    <div id="auth-warning" class="auth-warning">
      <p class="auth-warning-title">Login required</p>
      <p class="auth-warning-body">Sign in to PriceTrack to start tracking products and get price drop alerts.</p>
      <a href="http://localhost:5173/login" target="_blank" class="btn-login">Sign in to PriceTrack</a>
    </div>

    <!-- Main app -->
    <div id="app-content">

      <!-- Default: track state -->
      <div id="track-state">
        <div class="url-card">
          <p class="url-label">Current page</p>
          <p id="url-display" class="url-text">Getting page URL…</p>
        </div>

        <button id="track-btn" class="btn-track">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" width="15" height="15">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          <span id="track-btn-text">Track This Product</span>
        </button>

        <div id="error-banner" class="error-banner"></div>
      </div>

      <!-- Success state -->
      <div id="success-state">
        <div class="success-card">
          <div class="success-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <p class="success-title">Product added!</p>
          <p class="success-sub">We'll alert you when the price drops.</p>
        </div>

        <button id="dashboard-btn" class="btn-dashboard">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          View in Dashboard
        </button>

        <button id="track-another-btn" class="btn-track-another">Track another product</button>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="http://localhost:5173" target="_blank">Open PriceTrack ↗</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
