<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 320px;
      margin: 0;
      padding: 0;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .header {
      background: white;
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
    }
    .container {
      padding: 20px;
      text-align: center;
    }
    .url-display {
      font-size: 12px;
      color: #64748b;
      background: #f1f5f9;
      padding: 8px;
      border-radius: 6px;
      word-break: break-all;
      margin-bottom: 16px;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .btn {
      width: 100%;
      background-color: #000000;
      color: white;
      border: none;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #333333;
    }
    .btn:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    .message {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 500;
      min-height: 20px;
    }
    .success {
      color: #16a34a;
    }
    .error {
      color: #dc2626;
    }
    .auth-warning {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-warning a {
      color: #dc2626;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Price Tracker</h1>
  </div>
  
  <div class="container">
    <div id="auth-warning" class="auth-warning">
      Please log in to your <a href="http://localhost:5173" target="_blank">Dashboard</a> first to sync your account.
    </div>

    <div id="app-content" style="display: none;">
      <div id="url-display" class="url-display">Getting current page...</div>
      
      <button id="track-btn" class="btn">
        Track This Product
      </button>
      
      <div id="message" class="message"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
